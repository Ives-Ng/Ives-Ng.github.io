<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>互動區 - 毅行記</title>
  <!-- 引用 Bootstrap 與你在 index.html 用的 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css"> 

  <style>
    .catalog-container {
      border: 1px solid #ccc;
      padding: 1rem;
      margin-bottom: 2rem;
      background-color: #f9f9f9;
    }
    .catalog-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #toggle-catalog {
      background: none;
      border: none;
      color: #007bff;
      cursor: pointer;
    }

    li {
      margin: 0.5rem 0;   /* 每個項目上下間距 */
    }


    section{
      scroll-margin-top: 100px;
    }

    .touristImg{
      width: 100%;
      max-width: 800px; 
      aspect-ratio: 4 / 3; 
      object-fit: cover; 
      height: auto;
    }

    .catalog-container ol{
      counter-reset: section;
      list-style-type: none;
      padding-left: 0;
      margin: 0;
    }

    .catalog-container li{ 
      margin: 10px 0; 
    }

    .catalog-container li::before{
      counter-increment: section;
      content: counters(section, ".") " ";
      font-weight: 800;
      display: inline-block;
      width: 30px;
    }

    .catalog-container ol ol{
      padding-left: 25px;
      margin-top: 8px;
    }

    #tourist ul{
      list-style-type: none;
    }

    .qa-game {
      max-width: 600px;
      margin: auto;
      margin-bottom: 20px;
    }

    .qa-game button {
      margin: 5px;
    }

  </style>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
    const questions = [
      {
        question: "蘇黎世因甚麼而繁榮",
        answers: ["造船工業", "咖啡貿易", "絲綢與紡織業", "黃金礦業"],
        correct: 2
      },
      {
        question: "高雄景點光之穹頂由誰創作？",
        answers: ["Dale Chihuly", "Judith Schaechter", "Lino Tagliapietra", "Narcissus Quagliata"],
        correct: 3 
      },
      {
        question: "以下那個地圖程式推薦在韓國使用",
        answers: ["Google Map", "Kakao Map", "Here WeGo", "Apple Maps"],
        correct: 1 
      },
      {
        question: "瑞士人最重視甚麼？",
        answers: ["禮貌", "準時", "誠信", "效率"],
        correct: 1 
      },
      {
        question: "日本最佳賞楓季節是何時？",
        answers: ["10-11月", "3-4月", "12月", "7-8月"],
        correct: 0 
      },
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let selectedAnswers = [];

    const startBtn = document.getElementById("start-btn");
    const gameContainer = document.getElementById("game-container");
    const questionElement = document.getElementById("question");
    const answersElement = document.getElementById("answers");
    const submitBtn = document.getElementById("submit-btn");
    const scoreElement = document.getElementById("score");

    startBtn.addEventListener("click", () => {
      startBtn.style.display = "none";
      gameContainer.style.display = "block";
      showQuestion();
    });

    function showQuestion() {
      const q = questions[currentQuestionIndex];
      questionElement.textContent = q.question;
      answersElement.innerHTML = "";

      q.answers.forEach((answer, index) => {
        const label = document.createElement("label");
        label.classList.add("d-block", "text-start");

        const input = document.createElement("input");
        input.type = "radio";
        input.name = "answer";
        input.value = index;

        label.appendChild(input);
        label.appendChild(document.createTextNode(" " + answer));
        answersElement.appendChild(label);
      });
    }

    submitBtn.addEventListener("click", () => {
        const selected = document.querySelector("input[name='answer']:checked");
        if (selected) {
          selectedAnswers.push(parseInt(selected.value));
        } else {
          selectedAnswers.push(null); // 沒選答案
        }

        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
          showQuestion();
        } else {
          calculateScore();
        }
      });

      function calculateScore() {
        score = 0;
        questions.forEach((q, i) => {
          if (selectedAnswers[i] === q.correct) {
            score++;
          }
        });

        questionElement.textContent = "遊戲結束 🎉";
        answersElement.innerHTML = "";
        submitBtn.style.display = "none";
        scoreElement.textContent = `你的分數是：${score} / ${questions.length} (為方便測試 只需答中一條)`;

        // 如果滿分，顯示表單
        if (score >= 1 /*=== questions.length*/) {
          const rewardForm = document.createElement("div");
          rewardForm.innerHTML = `
            <h5 class="mt-4">🎁 恭喜！你獲得抽獎資格</h5>
            <p class="text-muted">請填寫以下資料以便聯絡：</p>
            <form id="reward-form" class="mt-3">
              <div class="mb-3">
                <label for="name" class="form-label">姓名</label>
                <input type="text" id="name" class="form-control" placeholder="稱呼" pattern="[A-Za-z\u4e00-\u9fa5\s]+" required>
              </div>
              <div class="mb-3">
                <label for="phone" class="form-label">電話號碼</label>
                <input type="tel" id="phone" class="form-control" placeholder="+852" pattern=[0-9]{8} required>
              </div>
              <button type="submit" class="btn btn-success">提交</button>
            </form>
          `;
          gameContainer.appendChild(rewardForm);

          // 表單提交事件
          document.getElementById("reward-form").addEventListener("submit", function(e) {
            e.preventDefault();
            const name = document.getElementById("name").value;
            const phone = document.getElementById("phone").value;
            alert(`感謝 ${name}！中獎後我們會用電話 (+852) ${phone} 聯絡你。`);
            rewardForm.innerHTML = "<p class='text-success mt-3'>資料已提交 ✅</p>";
          });
        }
      }

    });

  </script>


</head>
<body>

        <div class="container-fluid">
            <a class="navbar-brand logo-title" href="index.html" id="logo-title"><img src="images/logo.png" class="logo-img" alt="Project 1"></a>
   
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
            </button>


            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav ">
                   <li class="nav-item"><a class="nav-link active" href="index.html">首頁</a></li>
                   <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="destinationDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">歐洲</a>
                        <div class="dropdown-menu">
                            <a class="dropdown-item" href="Zurich.html">瑞士 | 蘇黎世</a>
                        </div>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="destinationDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">亞洲</a>
                        <div class="dropdown-menu">
                            <a class="dropdown-item" href="Kaohsiung.html">台南 | 高雄</a>
                            <a class="dropdown-item" href="Seoul.html">南韓 | 首爾</a>
                            <a class="dropdown-item" href="Tokyo.html">日本 | 東京</a>
                        </div>
                    </li>
                   <li class="nav-item"><a class="nav-link active" href="GameZone.html">互動區</a></li>
                </ul>
            </div>
        </div>

    </nav>

    <div class="qa-game mt-5 text-center">
      <h5 class="mb-3">旅遊挑戰區 🎮</h5>

      <p class="text-muted">
        這裡會不定時舉行 <strong>問答挑戰</strong>，記得關注我的貼文！完成題目後，看看你能拿到多少分數吧。
      </p>

      <p class="text-muted">
        <strong>今期挑戰時限：</strong>
        <time datetime="2026-01-20">🕒 2026/01/20</time> ~ 
        <time datetime="2026-02-20">🕒 2026/02/20</time>
      </p>

      <p class="text-muted">
        <em>凡在遊戲中取得滿分的挑戰者</em>，將自動獲得抽獎資格。每期我都會抽出一位幸運兒，並送出一張
        <strong>隨機目的地的機票</strong>，帶你展開一段驚喜旅程！
      </p>

      <button id="start-btn" class="btn btn-success">開始遊戲</button>

      <div id="game-container" class="p-3 border rounded bg-light mt-3" style="display:none;">
        <p id="question"></p>
        <div id="answers" class="mt-3"></div>
        <button id="submit-btn" class="btn btn-primary mt-3">提交答案</button>
        <p id="score" class="mt-3 fw-bold"></p>
      </div>
    </div>



  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3">
